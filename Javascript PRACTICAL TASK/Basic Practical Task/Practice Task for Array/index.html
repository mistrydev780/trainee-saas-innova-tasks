<!DOCTYPE html>
<html lang="en">

<head>
    <title>Recipe Management System</title>
</head>

<body>

    <h1>Recipe Management System</h1>

    <label for="name">Recipe Name</label>
    <input type="text" id="name" placeholder="Enter Recipe Name">
    <br><br>
    <label for="category">Recipe Category</label>
    <input type="text" id="category" placeholder="Enter Recipe Category">
    <br><br>
    <label for="ingredient">Enter Ingredient</label>
    <input type="text" id="ingredient" placeholder="Ingredient">
    <br><br>

    <button id="addBtn">Add Recipe</button>
    <button id="deleteBtn">Delete Recipe</button>


    <br><br>

    <input type="text" id="search" placeholder="Search Ingredient">

    <button id="searchBtn">Search</button>

    <hr>

    <div id="recipeList"></div>

    <script src="index.js"></script>

</body>

</html>
